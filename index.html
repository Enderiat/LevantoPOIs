<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levanto Historical & Cultural Map</title>

    <!-- 1. Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <style>
        /* 2. Make the map fill the entire screen */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        #map {
            height: 100%;
            width: 100%;
        }
        /* Custom styling for the popup text */
        .popup-content h3 {
            margin: 0 0 5px 0;
            color: #16a085; /* Elegant sea-green for Liguria */
            font-family: sans-serif;
        }
        .popup-content p {
            margin: 0;
            font-family: sans-serif;
            font-size: 13px;
            color: #555;
        }
    </style>
</head>
<body>

    <!-- 3. The Map Container -->
    <div id="map"></div>

    <!-- 4. Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // 5. Initialize the Map centered on Levanto, Italy
        // [Latitude, Longitude], Zoom Level 16 allows a perfect view of the old town
        const map = L.map('map').setView([44.1685, 9.6125], 16);

        // 6. Add Map Tiles (Using OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 7. Define Historical & Cultural Landmarks of Levanto
        const pois = [
            {
                name: "Chiesa di Sant'Andrea",
                lat: 44.1691,
                lng: 9.6106,
                description: "Built in 1222, this striking church is a prime example of Ligurian Gothic architecture, famous for its black-and-white striped marble facade and beautiful rose window."
            },
            {
                name: "Castello di San Giorgio (Levanto Castle)",
                lat: 44.1684,
                lng: 9.6102,
                description: "An imposing 12th-century medieval fortress rebuilt by the Republic of Genoa in the 16th century to defend the coast. It sits on the hill overlooking the historic center."
            },
            {
                name: "Loggia Medievale",
                lat: 44.1678,
                lng: 9.6119,
                description: "Located in Piazza del Popolo, this rare 13th-century archival structure features elegant Romanesque arches and has received UNESCO recognition as a 'monument evidence of culture and peace'."
            },
            {
                name: "Le Grottesche (The Grotesques)",
                lat: 44.1695,
                lng: 9.6128,
                description: "Look up at the corner of Via Garibaldi and Via Vinzoni to spot these unique, whimsical 16th-century caricature frescoes painted onto the historical building facades."
            },
            {
                name: "Pista Ciclopedonale Maremonti",
                lat: 44.1668,
                lng: 9.6085,
                description: "A stunning coastal cycling and walking path built inside the disused 19th-century railway tunnels, connecting Levanto to Bonassola and Framura."
            }
        ];

        // 8. Loop through the Levanto landmarks and add interactive markers
        pois.forEach(poi => {
            const marker = L.marker([poi.lat, poi.lng]).addTo(map);

            // Generate the popup HTML structure
            const popupHTML = `
                <div class="popup-content">
                    <h3>${poi.name}</h3>
                    <p>${poi.description}</p>
                </div>
            `;

            marker.bindPopup(popupHTML);
        });
    </script>
</body>
</html>
