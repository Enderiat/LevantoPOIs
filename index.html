<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levanto Historical & Cultural Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <style>
        /* Make the map fill the entire browser screen */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        #map {
            height: 100%;
            width: 100%;
        }
        /* Custom styling for the media-rich popups */
        .popup-content {
            max-width: 250px;
            font-family: sans-serif;
        }
        .popup-content h3 {
            margin: 0 0 5px 0;
            color: #16a085; /* Ligurian sea green */
            font-size: 16px;
        }
        .popup-content p {
            margin: 0 0 10px 0;
            font-size: 13px;
            color: #555;
            line-height: 1.4;
        }
        .popup-img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            margin-bottom: 8px;
            display: block;
        }
        .audio-label {
            font-size: 11px;
            font-weight: bold;
            color: #777;
            display: block;
            margin-bottom: 4px;
        }
        .popup-audio {
            width: 100%;
            height: 30px;
        }
    </style>
</head>
<body>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // Initialize Map centered on Levanto, Italy
        const map = L.map('map').setView([44.1685, 9.6125], 16);

        // Add OpenStreetMap Base Tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Complete POI List with media paths mapped out
        const pois = [
            {
                name: "Chiesa di Sant'Andrea",
                lat: 44.1691,
                lng: 9.6106,
                description: "Built in 1222, this striking church is a prime example of Ligurian Gothic architecture, famous for its black-and-white striped marble facade.",
                image: "images/sant_andrea.jpg",
                audio: "audio/sant_andrea.mp3"
            },
            {
                name: "Castello di San Giorgio",
                lat: 44.1684,
                lng: 9.6102,
                description: "An imposing 12th-century medieval fortress rebuilt by the Republic of Genoa to defend the coast from pirate raids.",
                image: "LevantoPOIs/Images/castello.jpeg",
                audio: "LevantoPOIs/Audio/Castello.mp3"
            },
            {
                name: "Loggia Medievale",
                lat: 44.1678,
                lng: 9.6119,
                description: "A rare 13th-century commercial and archival structure featuring elegant Romanesque arches, recognized by UNESCO.",
                image: "images/loggia.jpg",
                audio: "audio/loggia.mp3"
            },
            {
                name: "Le Grottesche (The Grotesques)",
                lat: 44.1695,
                lng: 9.6128,
                description: "Whimsical 16th-century caricature frescoes painted onto the historical building facades along Via Garibaldi.",
                image: "images/grottesche.jpg",
                audio: "audio/grottesche.mp3"
            },
            {
                name: "Pista Ciclopedonale Maremonti",
                lat: 44.1668,
                lng: 9.6085,
                description: "A stunning coastal cycling and walking path built inside disused 19th-century railway tunnels, linking Levanto to nearby towns.",
                image: "images/maremonti.jpg",
                audio: "audio/maremonti.mp3"
            }
        ];

        // Loop through POIs and build the rich media popups dynamically
        pois.forEach(poi => {
            const marker = L.marker([poi.lat, poi.lng]).addTo(map);

            // Build HTML string checking if image or audio exist for the item
            let popupHTML = `<div class="popup-content">`;
            popupHTML += `<h3>${poi.name}</h3>`;

            if (poi.image) {
                popupHTML += `<img src="${poi.image}" alt="${poi.name}" class="popup-img">`;
            }

            popupHTML += `<p>${poi.description}</p>`;

            if (poi.audio) {
                popupHTML += `
                    <span class="audio-label">Audio Guide:</span>
                    <audio controls class="popup-audio">
                        <source src="${poi.audio}" type="audio/mpeg">
                        Your browser does not support the audio element.
                    </audio>
                `;
            }

            popupHTML += `</div>`;

            // Bind the final built HTML popup to the marker
            marker.bindPopup(popupHTML);
        });
    </script>
</body>
</html>
